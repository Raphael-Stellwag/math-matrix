<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a67d6"/>
      <stop offset="1" stop-color="#1e3f96"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the icon also works as a maskable icon -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- glyph "x =" kept within the maskable safe zone (centre 80%) -->
  <g fill="none" stroke="#ffffff" stroke-width="38" stroke-linecap="round">
    <!-- x -->
    <line x1="148" y1="196" x2="268" y2="316"/>
    <line x1="268" y1="196" x2="148" y2="316"/>
    <!-- = -->
    <line x1="308" y1="232" x2="392" y2="232"/>
    <line x1="308" y1="292" x2="392" y2="292"/>
  </g>
</svg>
